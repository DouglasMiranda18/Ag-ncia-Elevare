<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentoria de Argumentação Jurídica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vermelho: #3e2214Z;
            --dourado: #b67437;
            --cinza-claro: #c8a594;
            --cinza: #e9dddd;
            --fonte: 'Montserrat', Arial, sans-serif;
        }
        html, body {
            margin: 0;
            padding: 0;
            font-family: var(--fonte);
            background: var(--cinza-claro);
            color: #222;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--dourado);
            box-shadow: 0 4px 16px rgba(183,28,28,0.08);
            margin-bottom: 1rem;
        }
        .bem-vindo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--vermelho);
            margin-bottom: 0.5rem;
        }
        .subtexto {
            font-size: 1rem;
            color: var(--dourado);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .bloco {
            background: var(--cinza);
            border-radius: 1.2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 1.5rem;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .bloco .icone-bg {
            position: absolute;
            font-size: 5rem;
            color: var(--dourado);
            opacity: 0.08;
            top: 10px;
            right: 10px;
            pointer-events: none;
        }
        .bloco .icone-checklist {
            color: var(--vermelho);
            margin-right: 0.5rem;
        }
        .bloco .icone-linkedin {
            color: #0077b5;
            font-size: 2.5rem;
            margin-right: 1rem;
        }
        .bloco .img-bloco {
            width: 90px;
            height: 90px;
            border-radius: 1rem;
            object-fit: cover;
            margin: 1rem 0 0.5rem 0;
            border: 2px solid var(--dourado);
        }
        .bloco .img-horizontal {
            width: 120px;
            height: 70px;
            border-radius: 0.7rem;
            object-fit: cover;
            margin: 0.5rem 0 0.5rem 0;
            border: 2px solid #0077b5;
        }
        .bloco .titulo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--vermelho);
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
        }
        .bloco .subtitulo {
            font-size: 1rem;
            color: var(--dourado);
            margin-bottom: 0.5rem;
        }
        .bloco-linkedin {
            background: #fff;
            border: 1.5px solid #ececec;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            min-height: 90px;
        }
        .bloco-linkedin .icone-bg {
            left: 60%;
            top: 10px;
            font-size: 4.5rem;
            color: #0077b5;
            opacity: 0.07;
        }
        .bloco-linkedin .img-horizontal {
            margin: 0 0.5rem 0 0;
        }
        .bloco-linkedin .frase {
            font-size: 1.1rem;
            color: #222;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .container {
                padding: 0.5rem;
            }
            .bloco {
                padding: 1rem 0.5rem;
            }
            .bloco-linkedin {
                min-height: 70px;
            }
        }
        .destaque-bloco1 {
            width: 100%;
            max-width: 92%;
            display: block;
            margin: 1.2rem auto 0.7rem auto;
            border-radius: 1.2rem;
            border: 5px solid var(--dourado);
            object-fit: cover;
            object-position: top;
            aspect-ratio: 3/4;
            box-shadow: 0 8px 40px rgba(62,34,20,0.13);
            background: #fff;
        }
        .destaque-bloco1-contain {
            object-fit: contain !important;
            background: #fff;
        }
        @media (max-width: 600px) {
            .destaque-bloco1 {
                max-width: 98%;
                border-width: 3px;
            }
        }
        .destaque-bloco1-bottom {
            object-position: center bottom !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="Logo Feijoada.png" alt="Foto da Profissional" class="foto-perfil">
            <div class="bem-vindo">Feijoada da Dayse</div>
            <div class="subtexto">Links úteis</div>
        </header>
        <!-- Bloco 1: ID -->
        <div class="bloco">
            <span class="icone-bg"><i class="fas fa-balance-scale"></i></span>
            <div class="titulo">Identidade Visual</div>
            <div class="subtitulo">Rebranding Completo</div>
            <img src="ID FEIJOADA.png" alt="Profissional em destaque" class="destaque-bloco1 destaque-bloco1-contain">
        </div>
        <!-- Bloco 2: Site -->
        <div class="bloco">
            <span class="icone-bg"><i class="fas fa-cart-shopping"></i></span>
            <div class="titulo"><i class="fas fa-clipboard-list icone-checklist"></i>Site de Pedidos</div>
            <div class="subtitulo"><a href="https://feijoadadadayse.com.br" target="_blank" style="color: inherit; text-decoration: underline; font-weight: 600;">Acesse o site</a></div>
            <iframe 
            src="https://feijoadadadayse.com.br" 
            class="destaque-bloco1"
            style="background:#fff; border-radius:1.2rem; border: 5px solid var(--dourado); width:100%; aspect-ratio: 1/1; min-height:350px;"
            frameborder="0"
            allowfullscreen>
        </iframe>
        </div>
        <!-- Bloco 3: Instagram -->
        <div class="bloco">
            <span class="icone-bg"><i class="fab fa-instagram"></i></span>
            <div class="titulo">Instagram</div>
            <div class="subtitulo"></div>
             <div class="subtitulo"><a href="https://www.instagram.com/feijoada.da.dayse/" target="_blank" style="color: inherit; text-decoration: underline; font-weight: 600;">Siga no Instagram</a></div>
            <img src="Insta feijoada.jpeg" alt="Instagram Feijoada da Dayse" class="destaque-bloco1 destaque-bloco1-bottom">
        </div>
    </div>
</body>
</html>
