<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Floricultura Santa Maria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vermelho: #af4563;
            --dourado:#689d88;
            --cinza-claro: #ffebf4;
            --cinza: #e9dddd;
            --fonte: 'Montserrat', Arial, sans-serif;
        }
        html, body {
            margin: 0;
            padding: 0;
            font-family: var(--fonte);
            background: var(--cinza-claro);
            color: #222;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: contain;
            border: 4px solid var(--dourado);
            box-shadow: 0 4px 16px rgba(183,28,28,0.08);
            margin-bottom: 1rem;
        }
        .bem-vindo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--vermelho);
            margin-bottom: 0.5rem;
        }
        .subtexto {
            font-size: 1rem;
            color: var(--dourado);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .bloco {
            background: var(--cinza);
            border-radius: 1.2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 1.5rem;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .bloco .icone-bg {
            position: absolute;
            font-size: 5rem;
            color: var(--dourado);
            opacity: 0.08;
            top: 10px;
            right: 10px;
            pointer-events: none;
        }
        .bloco .titulo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--vermelho);
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
        }
        .bloco .subtitulo {
            font-size: 1rem;
            color: var(--dourado);
            margin-bottom: 0.5rem;
        }
        .destaque-bloco1 {
            width: 100%;
            max-width: 92%;
            display: block;
            margin: 1.2rem auto 0.7rem auto;
            border-radius: 1.2rem;
            border: 5px solid var(--dourado);
            object-fit: cover;
            object-position: top;
            aspect-ratio: 1/1;
            box-shadow: 0 8px 40px rgba(62,34,20,0.13);
            background: #fff;
        }
        .destaque-bloco1-contain {
            object-fit: contain !important;
            background: #fff;
        }
        .destaque-bloco1-bottom {
            object-position: center bottom !important;
        }
        @media (max-width: 600px) {
            .container {
                padding: 0.5rem;
            }
            .bloco {
                padding: 1rem 0.5rem;
            }
            .destaque-bloco1 {
                max-width: 98%;
                border-width: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="IMG_2201.jpg" alt="Logo Feijoada da Dayse" class="foto-perfil">
            <div class="bem-vindo">Feijoada da Dayse</div>
            <div class="subtexto">Links úteis</div>
        </header>
        <!-- Bloco 1: Site de Pedidos -->
        <div class="bloco">
            <span class="icone-bg"><i class="fas fa-cart-shopping"></i></span>
            <div class="titulo">Site de Pedidos</div>
            <div class="subtitulo"><a href="https://floriculturasantamaria.com.br" target="_blank" style="color: inherit; text-decoration: underline; font-weight: 600;">Acesse o site</a></div>
            <iframe 
                src="https://floriculturasantamaria.com.br" 
                class="destaque-bloco1"
                style="background:#fff; border-radius:1.2rem; border: 5px solid var(--dourado); width:100%; aspect-ratio: 1/1; min-height:350px;"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        <!-- Bloco 2: Instagram -->
        <div class="bloco">
            <span class="icone-bg"><i class="fab fa-instagram"></i></span>
            <div class="titulo">Instagram</div>
            <div class="subtitulo"><a href="https://instagram.com/flores.santa.maria" target="_blank" style="color: inherit; text-decoration: underline; font-weight: 600;">Siga no Instagram</a></div>
            <img src="Insta floricultura.png" alt="Instagram Floricultura Santa Maria" class="destaque-bloco1 destaque-bloco1-bottom">
        </div>
    </div>
</body>
</html>
